<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite Tabungan Tracker</title>
  
  <!-- Memanggil Baju Elite (Tailwind CSS) -->
  <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
  <!-- Memanggil Icon (Lucide) -->
  <script src="[https://unpkg.com/lucide@latest](https://unpkg.com/lucide@latest)"></script>
  
  <!-- MEMANGGIL FILE CSS MILIKMU -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-pink-50 p-4 md:p-8 font-sans text-slate-800">

  <div class="max-w-md mx-auto space-y-6">
    
    <!-- Bagian Header -->
    <div class="text-center space-y-2">
      <div class="inline-flex items-center justify-center p-3 bg-pink-200 rounded-full mb-2 shadow-sm">
        <i data-lucide="piggy-bank" class="text-pink-600 w-8 h-8"></i>
      </div>
      <h1 class="text-2xl font-bold text-pink-600 flex items-center justify-center gap-2">
        <i data-lucide="sparkles" class="text-pink-400 w-5 h-5"></i>
        Elite Savings Tracker
        <i data-lucide="sparkles" class="text-pink-400 w-5 h-5"></i>
      </h1>
      <p class="text-sm text-pink-500 font-medium">Ayo semangat nabung, Nya~! 🌸</p>
    </div>

    <!-- Bagian Saldo & Target -->
    <div class="bg-white rounded-3xl p-6 shadow-xl shadow-pink-100 border border-pink-100">
      <div class="flex justify-between items-start mb-4">
        <div>
          <p class="text-sm text-slate-500 font-medium mb-1">Total Tabungan</p>
          <h2 id="balance-display" class="text-3xl font-bold text-slate-800">Rp 0</h2>
        </div>
        <button onclick="toggleTargetEdit()" class="p-2 bg-pink-50 hover:bg-pink-100 text-pink-600 rounded-full transition" title="Ubah Target">
          <i data-lucide="target" class="w-5 h-5"></i>
        </button>
      </div>

      <!-- Mode Ubah Target -->
      <form id="target-edit" onsubmit="saveTarget(event)" class="hidden flex gap-2 mb-4 bg-pink-50 p-3 rounded-2xl">
        <input type="number" id="input-target" class="flex-1 bg-white border-none rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-pink-300" placeholder="Set Target Baru...">
        <button type="submit" class="bg-pink-500 text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-pink-600 transition">
          Simpan
        </button>
      </form>

      <!-- Mode Lihat Target -->
      <div id="target-view" class="mb-4">
        <p class="text-xs text-slate-400 mb-1 flex justify-between">
          <span id="target-display">Target: Rp 1.000.000</span>
          <span id="progress-text">0.0%</span>
        </p>
        <div class="h-3 w-full bg-slate-100 rounded-full overflow-hidden">
          <div id="progress-bar" class="h-full bg-gradient-to-r from-pink-400 to-rose-500 transition-all duration-500 ease-out" style="width: 0%"></div>
        </div>
      </div>
    </div>

    <!-- Bagian Input Uang -->
    <div class="bg-white rounded-3xl p-6 shadow-xl shadow-pink-100 border border-pink-100 space-y-4">
      <div>
        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 block">Nominal Uang (Rp)</label>
        <input type="number" id="input-amount" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-pink-300 transition" placeholder="0">
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 block">Catatan (Opsional)</label>
        <input type="text" id="input-note" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-pink-300 transition" placeholder="Contoh: Nabung sisa uang jajan">
      </div>
      <div class="flex gap-3 pt-2">
        <button onclick="addTransaction('in')" class="flex-1 bg-pink-500 hover:bg-pink-600 text-white font-medium py-3 rounded-2xl flex items-center justify-center gap-2 transition active:scale-95 shadow-md shadow-pink-200">
          <i data-lucide="plus" class="w-5 h-5"></i> Tambah
        </button>
        <button onclick="addTransaction('out')" class="flex-1 bg-white border-2 border-slate-200 hover:border-pink-300 hover:bg-pink-50 text-slate-600 font-medium py-3 rounded-2xl flex items-center justify-center gap-2 transition active:scale-95">
          <i data-lucide="minus" class="w-5 h-5"></i> Ambil
        </button>
      </div>
    </div>

    <!-- Bagian Riwayat Transaksi -->
    <div class="bg-white rounded-3xl p-6 shadow-xl shadow-pink-100 border border-pink-100">
      <div class="flex items-center gap-2 mb-4 text-slate-800">
        <i data-lucide="history" class="text-pink-500 w-5 h-5"></i>
        <h3 class="font-bold">Riwayat Elite</h3>
      </div>
      <div id="history-container" class="space-y-3 max-h-60 overflow-y-auto pr-2 custom-scrollbar">
        <!-- List riwayat akan muncul di sini -->
      </div>
    </div>

  </div>

  <!-- MEMANGGIL FILE JAVASCRIPT MILIKMU -->
  <script src="script.js"></script>
</body>
</html>
