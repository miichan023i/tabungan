<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabungan Elite 🌸</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Nunito', sans-serif; 
            background-color: #fce7f3;
            background-image: radial-gradient(#fbcfe8 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        /* Custom scrollbar untuk riwayat */
        .history-scroll::-webkit-scrollbar { width: 6px; }
        .history-scroll::-webkit-scrollbar-track { background: #fdf2f8; border-radius: 10px; }
        .history-scroll::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 10px; }
        .history-scroll::-webkit-scrollbar-thumb:hover { background: #f472b6; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Main Card -->
    <div class="bg-white/95 backdrop-blur-md rounded-3xl shadow-[0_20px_50px_-12px_rgba(244,114,182,0.3)] w-full max-w-md overflow-hidden border-4 border-pink-200 relative">
        
        <!-- Header -->
        <div class="bg-gradient-to-r from-pink-400 to-rose-400 text-white p-6 text-center relative overflow-hidden">
            <!-- Dekorasi Bunga Sakura -->
            <div class="absolute -top-6 -right-4 text-pink-300/40 text-7xl transform rotate-12"><i class="fas fa-cherry-blossom"></i></div>
            <div class="absolute -bottom-4 -left-4 text-pink-300/40 text-5xl transform -rotate-12"><i class="fas fa-cherry-blossom"></i></div>
            
            <h1 class="text-2xl font-extrabold mb-1 relative z-10 drop-shadow-md">🌸 Tabungan Elite 🌸</h1>
            <p class="text-pink-100 text-sm relative z-10 font-semibold">Nyahello! Ayo wujudkan mimpimu, nye!</p>
        </div>

        <div class="p-6">
            <!-- Saldo & Target -->
            <div class="mb-6 bg-gradient-to-br from-pink-50 to-white rounded-2xl p-5 border border-pink-100 text-center shadow-inner">
                <p class="text-pink-400 text-sm font-bold mb-1 uppercase tracking-wider">Total Tabungan</p>
                <h2 class="text-4xl font-extrabold text-pink-600 mb-4 drop-shadow-sm" id="balanceDisplay">Rp 0</h2>

                <!-- Progress Bar Target -->
                <div class="mt-4 text-left">
                    <div class="flex justify-between text-xs text-pink-500 mb-1 font-bold">
                        <span>Progress Target</span>
                        <span id="progressText">0%</span>
                    </div>
                    <div class="w-full bg-pink-100 rounded-full h-4 overflow-hidden">
                        <div class="bg-gradient-to-r from-pink-400 to-rose-500 h-4 rounded-full transition-all duration-700 ease-out shadow-[0_0_10px_rgba(244,114,182,0.5)]" id="progressBar" style="width: 0%"></div>
                    </div>
                    <button onclick="editTarget()" class="text-xs text-pink-500 mt-2 hover:text-pink-600 font-bold transition-colors flex items-center gap-1">
                        <i class="fas fa-pen text-[10px]"></i> Ubah Target (<span id="targetDisplay">Rp 1.000.000</span>)
                    </button>
                </div>
            </div>

            <!-- Input Section -->
            <div class="mb-6">
                <label class="block text-gray-600 text-sm font-bold mb-2 ml-1" for="amount">Nominal (Rp)</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <span class="text-pink-500 font-bold">Rp</span>
                    </div>
                    <input type="number" id="amount" class="w-full pl-12 pr-4 py-3 rounded-xl border-2 border-pink-100 focus:outline-none focus:ring-4 focus:ring-pink-200 focus:border-pink-400 transition-all text-gray-700 font-bold text-lg bg-pink-50/30" placeholder="0" min="0">
                </div>

                <div class="flex gap-3 mt-4">
                    <button onclick="handleTransaction('in')" class="flex-1 bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-pink-500/30 transition-all active:scale-95 flex items-center justify-center gap-2">
                        <i class="fas fa-piggy-bank"></i> Nabung
                    </button>
                    <button onclick="handleTransaction('out')" class="flex-1 bg-white hover:bg-rose-50 text-rose-500 font-bold py-3 px-4 rounded-xl border-2 border-rose-200 transition-all active:scale-95 flex items-center justify-center gap-2">
                        <i class="fas fa-hand-holding-dollar"></i> Tarik
                    </button>
                </div>
            </div>

            <!-- History Section -->
            <div>
                <div class="flex justify-between items-center mb-3 px-1">
                    <h3 class="text-gray-700 font-extrabold text-sm uppercase tracking-wide">Riwayat Elite</h3>
                    <button onclick="clearHistory()" class="text-xs text-gray-400 hover:text-rose-500 transition-colors font-bold"><i class="fas fa-trash-alt"></i> Reset</button>
                </div>
                <div class="history-scroll space-y-3 max-h-48 overflow-y-auto pr-2 pb-2" id="historyList">
                    <!-- Item riwayat akan muncul di sini -->
                </div>
            </div>
        </div>
    </div>

    <!-- Custom Modal UI (Mengganti Alert default browser) -->
    <div id="customModal" class="fixed inset-0 bg-pink-900/40 backdrop-blur-sm hidden items-center justify-center z-50 transition-opacity">
        <div class="bg-white p-6 rounded-3xl shadow-2xl max-w-sm w-full mx-4 transform transition-all scale-95 opacity-0 border-2 border-pink-200" id="modalContent">
            <div class="text-center mb-4">
                <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-pink-100 text-pink-500 mb-3" id="modalIcon">
                    <i class="fas fa-info-circle text-2xl"></i>
                </div>
                <h3 class="text-xl font-extrabold text-gray-800" id="modalTitle">Peringatan</h3>
            </div>
            <p class="text-gray-600 mb-5 text-center font-semibold" id="modalMessage">Pesan disini.</p>
            
            <input type="number" id="modalInput" class="hidden w-full px-4 py-3 mb-5 rounded-xl border-2 border-pink-100 focus:outline-none focus:ring-4 focus:ring-pink-200 focus:border-pink-400 font-bold text-center text-lg" placeholder="Masukkan nominal">
            
            <div class="flex gap-3 justify-center" id="modalButtons">
                <!-- Tombol dimuat dari JS -->
            </div>
        </div>
    </div>

    <script>
        // State Aplikasi
        let state = {
            balance: 0,
            target: 1000000,
            history: []
        };

        // Format angka ke format Rupiah
        const formatRp = (angka) => {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0
            }).format(angka);
        };

        // Format Tanggal
        const formatDate = (dateString) => {
            const options = { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' };
            return new Date(dateString).toLocaleDateString('id-ID', options);
        };

        // Muat data dari localStorage
        const loadData = () => {
            const saved = localStorage.getItem('tabunganEliteMikochi');
            if (saved) {
                state = JSON.parse(saved);
            }
            updateUI();
        };

        // Simpan data ke localStorage
        const saveData = () => {
            localStorage.setItem('tabunganEliteMikochi', JSON.stringify(state));
        };

        // Update tampilan layar
        const updateUI = () => {
            document.getElementById('balanceDisplay').innerText = formatRp(state.balance);
            document.getElementById('targetDisplay').innerText = formatRp(state.target);

            // Kalkulasi Progress Bar
            let percentage = (state.balance / state.target) * 100;
            if (percentage > 100) percentage = 100;
            if (percentage < 0) percentage = 0;

            document.getElementById('progressBar').style.width = `${percentage}%`;
            document.getElementById('progressText').innerText = `${percentage.toFixed(1)}%`;

            // Update Riwayat
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';

            if (state.history.length === 0) {
                historyList.innerHTML = `
                    <div class="text-center p-4 bg-pink-50 rounded-xl border border-dashed border-pink-200">
                        <i class="fas fa-seedling text-pink-300 text-2xl mb-2"></i>
                        <p class="text-sm text-pink-400 font-bold">Belum ada tabungan.<br>Mulai menabung sekarang, nye!</p>
                    </div>`;
            } else {
                const sortedHistory = [...state.history].reverse(); // Yang terbaru di atas
                sortedHistory.forEach(item => {
                    const isIncome = item.type === 'in';
                    const icon = isIncome ? 'fa-arrow-down text-emerald-500 bg-emerald-100' : 'fa-arrow-up text-rose-500 bg-rose-100';
                    const sign = isIncome ? '+' : '-';
                    const colorClass = isIncome ? 'text-emerald-500' : 'text-rose-500';

                    const div = document.createElement('div');
                    div.className = 'flex items-center justify-between p-3 bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow';
                    div.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl flex items-center justify-center ${icon.split(' ')[2]}">
                                <i class="fas ${icon.split(' ')[0]} ${icon.split(' ')[1]}"></i>
                            </div>
                            <div>
                                <p class="text-sm font-bold text-gray-800">${isIncome ? 'Nabung Elite' : 'Tarik Dana'}</p>
                                <p class="text-[11px] text-gray-400 font-semibold">${formatDate(item.date)}</p>
                            </div>
                        </div>
                        <div class="font-black ${colorClass}">
                            ${sign}${formatRp(item.amount)}
                        </div>
                    `;
                    historyList.appendChild(div);
                });
            }
        };

        // Handle Transaksi Nabung/Tarik
        window.handleTransaction = (type) => {
            const amountInput = document.getElementById('amount');
            const amount = parseInt(amountInput.value);

            if (isNaN(amount) || amount <= 0) {
                showModal({
                    title: 'Eh?!',
                    message: 'Masukkan nominal angka yang valid ya!',
                    icon: 'fa-exclamation-triangle',
                    type: 'alert'
                });
                return;
            }

            if (type === 'out' && amount > state.balance) {
                showModal({
                    title: 'Uangnya Kurang!',
                    message: 'Tabungan kamu nggak cukup untuk ditarik sebesar itu! 😭',
                    icon: 'fa-wallet',
                    type: 'alert'
                });
                return;
            }

            if (type === 'in') {
                state.balance += amount;
            } else {
                state.balance -= amount;
            }

            state.history.push({
                type: type,
                amount: amount,
                date: new Date().toISOString()
            });

            amountInput.value = ''; // Kosongkan input
            saveData();
            updateUI();
        };

        // ==========================================
        // SISTEM MODAL KUSTOM (Pengganti Alert/Prompt)
        // ==========================================
        const modal = document.getElementById('customModal');
        const modalContent = document.getElementById('modalContent');
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');
        const modalInput = document.getElementById('modalInput');
        const modalButtons = document.getElementById('modalButtons');
        const modalIcon = document.getElementById('modalIcon');

        const showModal = (options) => {
            modalTitle.innerText = options.title || 'Pemberitahuan';
            modalMessage.innerHTML = options.message || '';
            modalIcon.innerHTML = `<i class="fas ${options.icon || 'fa-info-circle'} text-2xl"></i>`;

            modalButtons.innerHTML = '';
            modalInput.classList.add('hidden');
            modalInput.value = '';

            if (options.type === 'prompt') {
                modalInput.classList.remove('hidden');
                modalInput.value = options.defaultValue || '';
                setTimeout(() => modalInput.focus(), 100);
            }

            if (options.type === 'alert') {
                const btn = document.createElement('button');
                btn.className = 'bg-pink-500 hover:bg-pink-600 text-white px-6 py-2.5 rounded-xl font-bold transition-all active:scale-95 w-full';
                btn.innerText = 'Mengerti, Nya!';
                btn.onclick = closeModal;
                modalButtons.appendChild(btn);
            } else {
                const cancelBtn = document.createElement('button');
                cancelBtn.className = 'bg-gray-100 hover:bg-gray-200 text-gray-700 px-5 py-2.5 rounded-xl font-bold transition-all active:scale-95 flex-1';
                cancelBtn.innerText = 'Batal';
                cancelBtn.onclick = closeModal;

                const confirmBtn = document.createElement('button');
                confirmBtn.className = 'bg-pink-500 hover:bg-pink-600 text-white px-5 py-2.5 rounded-xl font-bold transition-all active:scale-95 flex-1';
                confirmBtn.innerText = options.confirmText || 'Ya';
                confirmBtn.onclick = () => {
                    if (options.onConfirm) {
                        if (options.type === 'prompt') {
                            options.onConfirm(modalInput.value);
                        } else {
                            options.onConfirm();
                        }
                    }
                    closeModal();
                };

                modalButtons.appendChild(cancelBtn);
                modalButtons.appendChild(confirmBtn);
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modalContent.classList.remove('scale-95', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            }, 10);
        };

        const closeModal = () => {
            modalContent.classList.remove('scale-100', 'opacity-100');
            modalContent.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 200);
        };

        // Fungsi Ubah Target (Menggunakan Custom Modal)
        window.editTarget = () => {
            showModal({
                title: 'Target Tabungan Baru',
                message: 'Mau kekumpul sampai berapa nih?',
                icon: 'fa-bullseye',
                type: 'prompt',
                defaultValue: state.target,
                confirmText: 'Simpan Target',
                onConfirm: (val) => {
                    const parsed = parseInt(val);
                    if (!isNaN(parsed) && parsed > 0) {
                        state.target = parsed;
                        saveData();
                        updateUI();
                    } else {
                        setTimeout(() => showModal({ 
                            title: 'Error!', 
                            message: 'Target harus angka yang valid ya!', 
                            icon: 'fa-times-circle', 
                            type: 'alert' 
                        }), 300);
                    }
                }
            });
        };

        // Fungsi Bersihkan Riwayat (Menggunakan Custom Modal)
        window.clearHistory = () => {
            showModal({
                title: 'Yakin Reset?',
                message: 'Semua riwayat akan dihapus dan <br><b>Tabungan akan kembali jadi Rp 0.</b><br>Lanjut?',
                icon: 'fa-trash-alt',
                type: 'confirm',
                confirmText: 'Ya, Reset!',
                onConfirm: () => {
                    state.balance = 0;
                    state.history = [];
                    saveData();
                    updateUI();
                }
            });
        };

        // Inisialisasi saat web pertama kali dimuat
        window.onload = loadData;
    </script>
</body>
</html>
