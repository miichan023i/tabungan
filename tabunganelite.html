<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite Tabungan Tracker</title>
  
  <!-- Memanggil Baju Elite (Tailwind CSS) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Memanggil Icon (Lucide) -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* Styling tambahan untuk scrollbar biar imut */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #fdf2f8; 
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #fbcfe8; 
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #f472b6; 
    }
  </style>
</head>
<body class="min-h-screen bg-pink-50 p-4 md:p-8 font-sans text-slate-800">

  <div class="max-w-md mx-auto space-y-6">
    
    <!-- Bagian Header -->
    <div class="text-center space-y-2">
      <div class="inline-flex items-center justify-center p-3 bg-pink-200 rounded-full mb-2 shadow-sm">
        <i data-lucide="piggy-bank" class="text-pink-600 w-8 h-8"></i>
      </div>
      <h1 class="text-2xl font-bold text-pink-600 flex items-center justify-center gap-2">
        <i data-lucide="sparkles" class="text-pink-400 w-5 h-5"></i>
        Elite Savings Tracker
        <i data-lucide="sparkles" class="text-pink-400 w-5 h-5"></i>
      </h1>
      <p class="text-sm text-pink-500 font-medium">Ayo semangat nabung, Nya~! 🌸</p>
    </div>

    <!-- Bagian Saldo & Target -->
    <div class="bg-white rounded-3xl p-6 shadow-xl shadow-pink-100 border border-pink-100">
      <div class="flex justify-between items-start mb-4">
        <div>
          <p class="text-sm text-slate-500 font-medium mb-1">Total Tabungan</p>
          <h2 id="balance-display" class="text-3xl font-bold text-slate-800">Rp 0</h2>
        </div>
        <button onclick="toggleTargetEdit()" class="p-2 bg-pink-50 hover:bg-pink-100 text-pink-600 rounded-full transition" title="Ubah Target">
          <i data-lucide="target" class="w-5 h-5"></i>
        </button>
      </div>

      <!-- Mode Ubah Target -->
      <form id="target-edit" onsubmit="saveTarget(event)" class="hidden flex gap-2 mb-4 bg-pink-50 p-3 rounded-2xl">
        <input type="number" id="input-target" class="flex-1 bg-white border-none rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-pink-300" placeholder="Set Target Baru...">
        <button type="submit" class="bg-pink-500 text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-pink-600 transition">
          Simpan
        </button>
      </form>

      <!-- Mode Lihat Target -->
      <div id="target-view" class="mb-4">
        <p class="text-xs text-slate-400 mb-1 flex justify-between">
          <span id="target-display">Target: Rp 1.000.000</span>
          <span id="progress-text">0.0%</span>
        </p>
        <div class="h-3 w-full bg-slate-100 rounded-full overflow-hidden">
          <div id="progress-bar" class="h-full bg-gradient-to-r from-pink-400 to-rose-500 transition-all duration-500 ease-out" style="width: 0%"></div>
        </div>
      </div>
    </div>

    <!-- Bagian Input Uang -->
    <div class="bg-white rounded-3xl p-6 shadow-xl shadow-pink-100 border border-pink-100 space-y-4">
      <div>
        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 block">Nominal Uang (Rp)</label>
        <input type="number" id="input-amount" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-lg focus:outline-none focus:ring-2 focus:ring-pink-300 transition" placeholder="0">
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2 block">Catatan (Opsional)</label>
        <input type="text" id="input-note" class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-pink-300 transition" placeholder="Contoh: Nabung sisa uang jajan">
      </div>
      <div class="flex gap-3 pt-2">
        <button onclick="addTransaction('in')" class="flex-1 bg-pink-500 hover:bg-pink-600 text-white font-medium py-3 rounded-2xl flex items-center justify-center gap-2 transition active:scale-95 shadow-md shadow-pink-200">
          <i data-lucide="plus" class="w-5 h-5"></i> Tambah
        </button>
        <button onclick="addTransaction('out')" class="flex-1 bg-white border-2 border-slate-200 hover:border-pink-300 hover:bg-pink-50 text-slate-600 font-medium py-3 rounded-2xl flex items-center justify-center gap-2 transition active:scale-95">
          <i data-lucide="minus" class="w-5 h-5"></i> Ambil
        </button>
      </div>
    </div>

    <!-- Bagian Riwayat Transaksi -->
    <div class="bg-white rounded-3xl p-6 shadow-xl shadow-pink-100 border border-pink-100">
      <div class="flex items-center gap-2 mb-4 text-slate-800">
        <i data-lucide="history" class="text-pink-500 w-5 h-5"></i>
        <h3 class="font-bold">Riwayat Elite</h3>
      </div>
      
      <!-- List riwayat akan muncul di dalam div ini -->
      <div id="history-container" class="space-y-3 max-h-60 overflow-y-auto pr-2 custom-scrollbar">
        <!-- Default Kosong -->
      </div>
    </div>

  </div>

  <!-- JavaScript Logika Tabungan Elite -->
  <script>
    // Menyimpan data utama
    let state = {
      target: 1000000,
      balance: 0,
      transactions: []
    };

    // Fungsi format Rupiah
    const formatIDR = (number) => {
      return new Intl.NumberFormat('id-ID', {
        style: 'currency',
        currency: 'IDR',
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
      }).format(number);
    };

    // Fungsi update layar utama
    function updateUI() {
      // Update Saldo & Target
      document.getElementById('balance-display').innerText = formatIDR(state.balance);
      document.getElementById('target-display').innerText = 'Target: ' + formatIDR(state.target);

      // Hitung persentase bar
      const progressPercentage = state.target > 0 ? Math.min((state.balance / state.target) * 100, 100) : 0;
      document.getElementById('progress-bar').style.width = progressPercentage + '%';
      document.getElementById('progress-text').innerText = progressPercentage.toFixed(1) + '%';

      // Update Riwayat Transaksi
      const historyContainer = document.getElementById('history-container');
      
      if (state.transactions.length === 0) {
        historyContainer.innerHTML = `
          <div class="text-center py-8 text-slate-400 text-sm">
            <p>Belum ada catatan nih.</p>
            <p>Ayo mulai nabung bareng Miko!</p>
          </div>
        `;
      } else {
        historyContainer.innerHTML = state.transactions.map(t => `
          <div class="flex items-center justify-between p-3 bg-slate-50 rounded-2xl hover:bg-pink-50 transition group mb-3">
            <div class="flex items-center gap-3">
              <div class="p-2 rounded-full ${t.type === 'in' ? 'bg-green-100 text-green-600' : 'bg-rose-100 text-rose-600'}">
                <i data-lucide="${t.type === 'in' ? 'plus' : 'minus'}" class="w-4 h-4"></i>
              </div>
              <div>
                <p class="text-sm font-semibold text-slate-800">${t.note}</p>
                <p class="text-xs text-slate-400">${t.date}</p>
              </div>
            </div>
            <div class="flex items-center gap-3">
              <span class="font-bold text-sm ${t.type === 'in' ? 'text-green-600' : 'text-rose-600'}">
                ${t.type === 'in' ? '+' : '-'}${formatIDR(t.amount)}
              </span>
              <button onclick="deleteTransaction('${t.id}')" class="text-slate-300 hover:text-rose-500 transition opacity-100 md:opacity-0 md:group-hover:opacity-100 cursor-pointer">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
              </button>
            </div>
          </div>
        `).join('');
      }

      // Render ulang icon Lucide setiap ada perubahan HTML
      lucide.createIcons();
    }

    // Fungsi Tambah/Ambil Uang
    function addTransaction(type) {
      const amountInput = document.getElementById('input-amount');
      const noteInput = document.getElementById('input-note');
      const amount = Number(amountInput.value);

      if (!amount || isNaN(amount) || amount <= 0) return;

      const newTx = {
        id: Date.now().toString(),
        type: type,
        amount: amount,
        note: noteInput.value || (type === 'in' ? 'Nabung' : 'Pengeluaran'),
        date: new Date().toLocaleString('id-ID')
      };

      // Tambahkan ke paling atas list
      state.transactions.unshift(newTx);
      
      // Update Saldo
      if (type === 'in') {
        state.balance += amount;
      } else {
        state.balance -= amount;
      }

      // Kosongkan input
      amountInput.value = '';
      noteInput.value = '';
      
      updateUI();
    }

    // Fungsi Hapus Transaksi
    function deleteTransaction(id) {
      const index = state.transactions.findIndex(t => t.id === id);
      if (index > -1) {
        const tx = state.transactions[index];
        // Kembalikan saldo
        if (tx.type === 'in') {
          state.balance -= tx.amount;
        } else {
          state.balance += tx.amount;
        }
        // Hapus dari list
        state.transactions.splice(index, 1);
        updateUI();
      }
    }

    // Fungsi Menampilkan/Menyembunyikan form edit target
    function toggleTargetEdit() {
      const viewMode = document.getElementById('target-view');
      const editMode = document.getElementById('target-edit');
      const input = document.getElementById('input-target');

      if (editMode.classList.contains('hidden')) {
        editMode.classList.remove('hidden');
        viewMode.classList.add('hidden');
        input.value = state.target;
      } else {
        editMode.classList.add('hidden');
        viewMode.classList.remove('hidden');
      }
    }

    // Fungsi Simpan Target Baru
    function saveTarget(e) {
      e.preventDefault(); // Mencegah halaman reload
      const newTarget = Number(document.getElementById('input-target').value);
      if (newTarget > 0) {
        state.target = newTarget;
        toggleTargetEdit(); // Tutup form
        updateUI(); // Perbarui layar
      }
    }

    // Jalankan updateUI saat halaman pertama kali dibuka
    document.addEventListener('DOMContentLoaded', () => {
      updateUI();
    });

  </script>
</body>
</html>
